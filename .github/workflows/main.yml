name: Build Android APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System and Python Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev libssl-dev python3-pip \
          zip unzip openjdk-17-jdk libncurses5 libncursesw5 zlib1g-dev \
          lib32stdc++6 lib32z1
          
          # یہاں ہم انسٹال بھی کر رہے ہیں اور راستہ بھی ہمیشہ کے لیے سیٹ کر رہے ہیں
          pip install --upgrade pip
          pip install "cython<3.0" buildozer
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build with Buildozer
        run: |
          # اب یہاں دوبارہ ایکسپورٹ کرنے کی ضرورت نہیں پڑے گی
          yes | buildozer android debug
          
