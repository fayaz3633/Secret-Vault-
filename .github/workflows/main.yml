name: Build Android APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # یہ حصہ اینڈرائیڈ کے ٹولز (AIDL وغیرہ) کا مسئلہ حل کرے گا
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev libssl-dev python3-pip \
          zip unzip openjdk-17-jdk libncurses5 libncursesw5 zlib1g-dev \
          lib32stdc++6 lib32z1  # یہ فائلیں AIDL کے لیے ضروری ہیں

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install "cython<3.0" buildozer 

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:~/.local/bin
          # یہ کمانڈ اینڈرائیڈ کے لائسنس خود بخود قبول کر لے گی
          yes | buildozer android debug
          
