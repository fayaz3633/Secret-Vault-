name: Build Android APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev libssl-dev python3-setuptools \
          zip unzip libncurses5 libncursesw5 zlib1g-dev python3-pip
          
          # یہاں ہم Cython اور Buildozer کو انسٹال کر رہے ہیں
          pip install --upgrade pip
          pip install "cython<3.0" buildozer 

      - name: Build with Buildozer
        run: |
          # یہ لائن سرور کو بتائے گی کہ اوزار (Tools) کہاں پڑے ہیں
          export PATH=$PATH:~/.local/bin
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VIP-Vault-APK
          path: bin/*.apk
