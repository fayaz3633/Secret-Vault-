name: Build Android APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          # یہاں ہم وہ تمام لائبریریاں ڈال رہے ہیں جو AIDL کو چلانے کے لیے ضروری ہیں
          sudo apt-get install -y build-essential libffi-dev libssl-dev python3-pip \
          zip unzip openjdk-17-jdk libncurses5 libncursesw5 zlib1g-dev \
          lib32stdc++6 lib32z1

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install "cython<3.0" buildozer
          echo "/home/runner/.local/bin" >> $GITHUB_PATH

      - name: Build with Buildozer (Log Level 2 + Auto Accept)
        run: |
          # یہ کمانڈ خود بخود لائسنس قبول کرے گی اور ہمیں تفصیل (Log Level 2) بھی دکھائے گی
          yes | buildozer android debug --verbose
          
