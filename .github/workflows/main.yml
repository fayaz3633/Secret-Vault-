name: Build Android APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # یہ وہ لائن ہے جو فائلوں کو "Locate" کروائے گی
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev libssl-dev python3-pip
          pip install --upgrade pip
          pip install "cython<3.0" buildozer 

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:~/.local/bin
          # ہم یہاں --verbose ڈال رہے ہیں تاکہ ہمیں تفصیل سے پتہ چلے کہ کیا ہو رہا ہے
          buildozer android debug --verbose
          
