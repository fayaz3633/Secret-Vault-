name: Build Android APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # یہ قدم اینڈرائیڈ کا سارا سسٹم خود سیٹ کر دے گا
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev libssl-dev python3-pip zip unzip openjdk-17-jdk
          pip install --upgrade pip
          pip install "cython<3.0" buildozer
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build with Buildozer
        run: |
          # اینڈرائیڈ پاتھ کو ایکٹو کرنا تاکہ ریڈ وارننگ ختم ہو جائے
          export APP_ANDROID_SDK=$ANDROID_HOME
          yes | buildozer android debug --verbose

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VIP-Vault-APK
          path: bin/*.apk
