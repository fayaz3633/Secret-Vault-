name: Build Android APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev libssl-dev python3-pip \
          zip unzip openjdk-17-jdk libncurses5 libncursesw5 zlib1g-dev \
          lib32stdc++6 lib32z1
          
          # سائتھون اور بلڈوزر کو بالکل صحیح طریقے سے انسٹال کرنا
          pip install --upgrade pip
          pip install "cython<3.0" buildozer
          
          # یہ لائن اسپیلنگ اور پاتھ کے تمام مسائل حل کر دے گی
          echo "/home/runner/.local/bin" >> $GITHUB_PATH

      - name: Build with Buildozer
        run: |
          # اینڈرائیڈ کے تمام لائسنس ایک ہی بار میں قبول کرنا
          yes | buildozer android debug
          
